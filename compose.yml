services:
  redis:
    image: redis:7-alpine
    container_name: medusa-redis
    restart: unless-stopped

    command: redis-server --appendonly yes

    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/kurczakooo/gamerfix-store-backend:latest
    container_name: medusa-backend

    restart: unless-stopped

    env_file:
      - ./apps/backend/.env

    ports:
      - "9000:9000"

    depends_on:
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  redis-data:
