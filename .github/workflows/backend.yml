name: Build Backend

on:
  push:
    branches:
      - master
      - devops/docker-config

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/kurczakooo/gamerfix-store-backend:latest
            ghcr.io/kurczakooo/gamerfix-store-backend:${{ github.sha }}
