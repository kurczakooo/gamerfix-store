name: Build & Deploy Backend

on:
  push:
    branches:
      - master
      - devops/docker-config

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/kurczakooo/gamerfix-store-backend:latest
            ghcr.io/kurczakooo/gamerfix-store-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=ghs,mode=max

  deploy:
    needs: build

    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.BACKEND_HOST_VPS_IP }}
          username: ${{ secrets.BACKEND_HOST_VPS_USER }}
          key: ${{ secrets.BACKEND_HOST_VPS_SSH_KEY }}

          script: |
            cd ~/gamerfix-store

            cat > .env <<EOF
            NODE_ENV=${{ secrets.NODE_ENV }}
            PORT=${{ secrets.PORT }}
            ADMIN_CORS=${{ secrets.ADMIN_CORS }}
            MEDUSA_BACKEND_URL=${{ secrets.MEDUSA_BACKEND_URL }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            AUTH_CORS=${{ secrets.AUTH_CORS }}
            STORE_CORS=${{ secrets.STORE_CORS }}
            AUTH_MFA_ENCRYPTION_KEY=${{ secrets.AUTH_MFA_ENCRYPTION_KEY }}
            COOKIE_SECRET=${{ secrets.COOKIE_SECRET }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            S3_ACCESS_KEY_ID=${{ secrets.S3_ACCESS_KEY_ID }}
            S3_BUCKET=${{ secrets.S3_BUCKET }}
            S3_ENDPOINT=${{ secrets.S3_ENDPOINT }}
            S3_FILE_URL=${{ secrets.S3_FILE_URL }}
            S3_REGION=${{ secrets.S3_REGION }}
            S3_SECRET_ACCESS_KEY=${{ secrets.S3_SECRET_ACCESS_KEY }}
            EOF

            docker compose pull
            docker compose up -deploy

            docker image prune -f
